<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Placement Predictor</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div class="wrapper">

    <header>
      <div class="tag">ML · Random Forest</div>
      <h1>Global <span>Placement</span><br />Predictor</h1>
      <p class="subtitle">Enter student profile details to predict placement outcome and estimated salary.</p>
    </header>

    <!-- Academic -->
    <div class="card">
      <div class="section-label">Academic Performance</div>
      <div class="grid three">
        <div class="field">
          <label>CGPA</label>
          <input type="number" id="cgpa" placeholder="e.g. 7.5" min="0" max="10" step="0.01" />
        </div>
        <div class="field">
          <label>Backlogs</label>
          <input type="number" id="backlogs" placeholder="e.g. 0" min="0" />
        </div>
        <div class="field">
          <label>College Tier</label>
          <select id="college_tier">
            <option value="">Select tier</option>
            <option>Tier 1</option>
            <option>Tier 2</option>
            <option>Tier 3</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Institution -->
    <div class="card">
      <div class="section-label">Institution & Geography</div>
      <div class="grid">
        <div class="field">
          <label>Country</label>
          <select id="country">
            <option value="">Select country</option>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Canada</option>
            <option>Germany</option>
          </select>
        </div>
        <div class="field">
          <label>University Ranking Band</label>
          <select id="university_ranking_band">
            <option value="">Select band</option>
            <option>Top 100</option>
            <option>100-300</option>
            <option>300+</option>
          </select>
        </div>
        <div class="field">
          <label>Specialization</label>
          <select id="specialization">
            <option value="">Select specialization</option>
            <option>AI/ML</option>
            <option>Cloud</option>
            <option>Cybersecurity</option>
            <option>Data Science</option>
            <option>Core CS</option>
          </select>
        </div>
        <div class="field">
          <label>Industry</label>
          <select id="industry">
            <option value="">Select industry</option>
            <option>Tech</option>
            <option>Finance</option>
            <option>Healthcare</option>
            <option>Consulting</option>
            <option>Manufacturing</option>
            <option>Other</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Skills & Internships -->
    <div class="card">
      <div class="section-label">Skills & Internships</div>
      <div class="grid">
        <div class="field">
          <label>Aptitude Score</label>
          <div class="range-wrap">
            <span class="range-val" id="aptitude_val">50</span>
            <input type="range" id="aptitude_score" min="0" max="100" value="50"
              oninput="document.getElementById('aptitude_val').textContent = this.value" />
          </div>
        </div>
        <div class="field">
          <label>Communication Score</label>
          <div class="range-wrap">
            <span class="range-val" id="comm_val">50</span>
            <input type="range" id="communication_score" min="0" max="100" value="50"
              oninput="document.getElementById('comm_val').textContent = this.value" />
          </div>
        </div>
        <div class="field">
          <label>Internship Count</label>
          <input type="number" id="internship_count" placeholder="e.g. 2" min="0" />
        </div>
        <div class="field">
          <label>Internship Quality Score</label>
          <div class="range-wrap">
            <span class="range-val" id="quality_val">5</span>
            <input type="range" id="internship_quality_score" min="0" max="10" step="0.1" value="5"
              oninput="document.getElementById('quality_val').textContent = this.value" />
          </div>
        </div>
      </div>

      <br />
      <button class="btn" id="submitBtn" onclick="predict()">Predict Placement & Salary</button>
    </div>

    <!-- Results -->
    <div id="result"></div>

  </div>

  <script>
    async function predict() {
      const btn = document.getElementById('submitBtn');
      const resultDiv = document.getElementById('result');

      // Collect values
      const payload = {
        cgpa: parseFloat(document.getElementById('cgpa').value),
        backlogs: parseInt(document.getElementById('backlogs').value),
        college_tier: document.getElementById('college_tier').value,
        country: document.getElementById('country').value,
        university_ranking_band: document.getElementById('university_ranking_band').value,
        internship_count: parseInt(document.getElementById('internship_count').value),
        aptitude_score: parseFloat(document.getElementById('aptitude_score').value),
        communication_score: parseFloat(document.getElementById('communication_score').value),
        specialization: document.getElementById('specialization').value,
        industry: document.getElementById('industry').value,
        internship_quality_score: parseFloat(document.getElementById('internship_quality_score').value),
      };

      // Basic validation
      for (const [key, val] of Object.entries(payload)) {
        if (val === '' || val === null || val === undefined || (typeof val === 'number' && isNaN(val))) {
          resultDiv.style.display = 'block';
          resultDiv.innerHTML = `<div class="error-box">⚠ Please fill in all fields before predicting.</div>`;
          return;
        }
      }

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Predicting...';
      resultDiv.style.display = 'none';

      try {
        // Placement prediction
        const placementRes = await fetch('/predict-placement', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const placementData = await placementRes.json();

        // Salary prediction
        const salaryRes = await fetch('/predict-salary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const salaryData = await salaryRes.json();

        const isPlaced = placementData.placement_status === 'Placed';
        const prob = (placementData.placement_probability * 100).toFixed(1);
        const salary = salaryData.predicted_salary
          ? `$${Number(salaryData.predicted_salary).toLocaleString('en-US', { maximumFractionDigits: 0 })}`
          : '—';

        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <div class="card">
            <div class="section-label">Prediction Results</div>
            <div class="result-grid">
              <div class="result-box placement">
                <div class="result-label">Placement Status</div>
                <div class="result-value ${isPlaced ? 'placed' : 'not-placed'}">
                  ${isPlaced ? 'Placed ✓' : 'Not Placed'}
                </div>
                <div class="result-sub">Confidence: ${prob}%</div>
                <div class="prob-bar-wrap">
                  <div class="prob-bar" style="width: ${prob}%"></div>
                </div>
              </div>
              <div class="result-box salary">
                <div class="result-label">Estimated Salary</div>
                <div class="result-value salary-val">${salary}</div>
                <div class="result-sub">${isPlaced ? 'Annual USD estimate' : 'No estimate — not placed'}</div>
              </div>
            </div>
          </div>
        `;

      } catch (err) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<div class="error-box">⚠ Could not connect to the prediction server. Make sure FastAPI is running.</div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Predict Placement & Salary';
      }
    }
  </script>
</body>

</html>
